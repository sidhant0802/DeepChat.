<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DeepChat · AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css">
<style>
.user-badge {
  display:flex; align-items:center; gap:7px;
  background:rgba(255,255,255,0.11);
  border:1px solid rgba(255,255,255,0.16);
  border-radius:22px; padding:4px 12px 4px 5px;
  cursor:pointer; transition:all .22s;
}
.user-badge:hover { background:rgba(255,255,255,0.2); }

.user-av-sm {
  width:27px; height:27px; border-radius:50%;
  background:linear-gradient(135deg,#2563eb,#4ade80);
  display:flex; align-items:center; justify-content:center;
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:.6rem; font-weight:800; color:#fff; flex-shrink:0;
  letter-spacing:-.01em;
}
.user-badge-name {
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:.7rem; font-weight:700; color:rgba(255,255,255,.9);
  max-width:80px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}

.user-menu-wrap { position:relative; }

.user-dropdown {
  position:absolute; top:calc(100% + 10px); right:0;
  background:#fff; border-radius:16px;
  box-shadow:0 14px 50px rgba(26,58,92,0.18), 0 2px 8px rgba(26,58,92,0.07);
  min-width:210px; overflow:hidden;
  opacity:0; transform:translateY(-8px) scale(.97);
  pointer-events:none;
  transition:all .22s cubic-bezier(.22,.68,0,1.1);
  z-index:200;
}
.user-dropdown.open { opacity:1; transform:none; pointer-events:all; }

.dd-head {
  padding:14px 16px 12px;
  background:linear-gradient(135deg,rgba(26,58,92,.04),rgba(37,99,235,.04));
  border-bottom:1px solid rgba(26,58,92,.07);
}
.dd-head-av {
  width:40px; height:40px; border-radius:12px; margin-bottom:9px;
  background:linear-gradient(135deg,#1a3a5c,#2563eb);
  display:flex; align-items:center; justify-content:center;
  font-family:'Plus Jakarta Sans',sans-serif; font-size:.9rem; font-weight:800; color:#fff;
}
.dd-head-name  { font-family:'Plus Jakarta Sans',sans-serif; font-size:.82rem; font-weight:700; color:#0f1f35; }
.dd-head-email { font-size:.68rem; color:#7a93ad; margin-top:2px; }

.dd-item {
  display:flex; align-items:center; gap:10px;
  padding:11px 16px; cursor:pointer;
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:.76rem; font-weight:600; color:#3a5070;
  transition:background .15s;
}
.dd-item:hover { background:#eef2f8; color:#0f1f35; }
.dd-item.danger:hover { background:rgba(239,68,68,.06); color:#dc2626; }
.dd-item svg { width:15px; height:15px; flex-shrink:0; }
.dd-sep { height:1px; background:rgba(26,58,92,.08); }

.user-dropdown.open {
  opacity:1;
  transform:none;
  pointer-events:all;
}
</style>
</head>
<body>

<div class="shell">

  <header>
    <div class="hdr-left">
      <div class="bot-av">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" width="22" height="22">
          <rect x="3" y="11" width="18" height="10" rx="3"/>
          <path d="M9 11V8a3 3 0 0 1 6 0v3"/>
          <circle cx="9" cy="16" r="1" fill="white" stroke="none"/>
          <circle cx="15" cy="16" r="1" fill="white" stroke="none"/>
        </svg>
      </div>
      <div class="hdr-info">
        <div class="hdr-name">DeepChat</div>
        <div class="hdr-sub">
          <span class="live-dot"></span>
          <span id="conn-status">Online · AI Assistant</span>
        </div>
      </div>
    </div>

    <div class="hdr-right">
      <button class="hdr-btn" onclick="clearChat()" title="Clear chat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10"/>
          <path d="M3.51 15a9 9 0 1 0 .49-3.51"/>
        </svg>
      </button>

      <div class="user-menu-wrap" id="user-menu-wrap">
        <div class="user-badge" id="user-badge" >
          <div class="user-av-sm" id="hdr-av">?</div>
          <span class="user-badge-name" id="hdr-name">User</span>
        </div>

        <div class="user-dropdown" id="user-dropdown">
          <div class="dd-head">
            <div class="dd-head-av" id="dd-av">?</div>
            <div class="dd-head-name"  id="dd-name">—</div>
            <div class="dd-head-email" id="dd-email">—</div>
          </div>
          <div class="dd-item" onclick="goProfile()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            My Profile
          </div>
          <div class="dd-sep"></div>
          <div class="dd-item danger" onclick="doLogout()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            Sign out
          </div>
        </div>
      </div>
    </div>
  </header>
  <div class="msgs" id="msgs">
    <div class="date-sep">Today</div>
    <div class="row bot" style="animation-delay:.12s">
      <div class="av-bot">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" width="15" height="15">
          <rect x="3" y="11" width="18" height="10" rx="3"/>
          <path d="M9 11V8a3 3 0 0 1 6 0v3"/>
          <circle cx="9" cy="16" r="1" fill="white" stroke="none"/>
          <circle cx="15" cy="16" r="1" fill="white" stroke="none"/>
        </svg>
      </div>
      <div class="bubble-wrap">
        <div class="bubble" id="greeting-bubble">
          Hello! I'm <strong>DeepChat</strong>, your AI assistant. How can I help you today? 👋
        </div>
        <div class="ts" id="init-ts"></div>
      </div>
    </div>
  </div>

  <div class="chips">
    <div class="chip" onclick="useChip(this)">News</div>
    <div class="chip" onclick="useChip(this)">Stocks</div>
    <div class="chip" onclick="useChip(this)">Coding</div>
    <!-- <div class="chip" onclick="useChip(this)">Account Help</div>
    <div class="chip" onclick="useChip(this)">Coding</div> -->
  </div>

  <div class="input-zone">
    <div class="voice-bar" id="voice-bar">
      <div class="voice-waves">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      Listening… speak now
      <button onclick="stopMic()"
        style="background:none;border:none;cursor:pointer;color:#ef4444;font-size:.7rem;font-weight:600;margin-left:4px;">
        Stop
      </button>
    </div>
    <div class="input-row">
      <div class="input-box">
        <textarea id="msg" rows="1" placeholder="Type your message…" maxlength="6000"></textarea>
        <button class="mic-btn" id="mic-btn" onclick="toggleMic()" title="Voice input">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8"  y1="23" x2="16" y2="23"/>
          </svg>
        </button>
      </div>
      <button class="send-btn" id="send-btn" onclick="sendMsg()">
        <svg viewBox="0 0 24 24">
          <path d="M22 2L11 13"/>
          <path d="M22 2L15 22 11 13 2 9l20-7z"
                stroke="white" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round" fill="none"/>
        </svg>
      </button>
    </div>
    <div class="input-hint">↵ to send &nbsp;·&nbsp; Shift+↵ new line &nbsp;·&nbsp; 🎤 mic for voice</div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="script.js"></script>

<script>
(async function sessionGuard() {
  try {
    const res = await fetch('/api/auth?action=me', { credentials: 'include' });
    if (!res.ok) {
      window.location.replace('/auth.html');
      return;
    }
    const { user } = await res.json();
    populateHeader(user);
  } catch (err) {
    // Server totally unreachable (e.g. dev with no backend)
    // Comment out the line below if you want to allow offline dev:
    window.location.replace('/auth.html');
  }
})();

function populateHeader(user) {
  const firstName = (user.name || 'User').split(' ')[0];
  const initials  = (user.name || '?')
    .split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);

  document.getElementById('hdr-av').textContent   = initials;
  document.getElementById('hdr-name').textContent = firstName;

  document.getElementById('dd-av').textContent    = initials;
  document.getElementById('dd-name').textContent  = user.name  || '—';
  document.getElementById('dd-email').textContent = user.email || '—';

  const greet = document.getElementById('greeting-bubble');
  if (greet) {
    greet.innerHTML =
      `Hello <strong>${firstName}</strong>! I'm <strong>DeepChat</strong>, ` +
      `your AI assistant. How can I help you today? 👋`;
  }
}

function toggleDropdown() {
  const menu = document.getElementById('user-dropdown');
  menu.classList.toggle('open');
}

document.addEventListener("DOMContentLoaded", () => {
  const badge = document.getElementById("user-badge");

  if (badge) {
    badge.addEventListener("click", toggleDropdown);
  }

  document.addEventListener("click", (e) => {
    const wrap = document.getElementById("user-menu-wrap");
    const menu = document.getElementById("user-dropdown");

    if (wrap && !wrap.contains(e.target)) {
      menu.classList.remove("open");
    }
  });
});

async function doLogout() {
  try {
    await fetch('/api/auth?action=logout', { method: 'POST', credentials: 'include' });
  } catch {}
  window.location.replace('/auth.html');
}


function goProfile() {
  document.getElementById('user-dropdown').classList.remove('open');
  window.location.href = '/auth.html';
}

</script>

</body>
</html>
